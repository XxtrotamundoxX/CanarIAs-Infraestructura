# =============================================================
# @File: infraestructura/gestion/nginx.conf
# @Description: Proxy Inverso de la Zona de Gestión (Privada).
# @IP: Escucha en 10.0.10.20 (puertos 80 y 443).
# @Logic: Este archivo es el "portero" de los servicios internos.
#   Recibe TODAS las peticiones HTTPS dirigidas a la IP 10.0.10.20
#   y decide a qué contenedor Docker enviar el tráfico, usando dos
#   estrategias:
#     1. POR DOMINIO (Virtual Hosts): docker.canarias.local → Portainer
#     2. POR RUTA (acceso por IP): 10.0.10.20/vault/ → Vaultwarden
#   También se encarga de:
#     - Redirigir todo el tráfico HTTP a HTTPS (seguridad).
#     - Servir el Portal PKI para descargar certificados.
#     - Gestionar WebSockets (necesarios para Portainer y Kuma).
# =============================================================

events { worker_connections 1024; }

http {
    include mime.types;    # Tipos de archivo estándar (CSS, JS, imágenes, etc.)
    sendfile on;           # Optimización: envía archivos directamente desde el kernel
    client_max_body_size 512M;  # Permite subir archivos grandes a Vaultwarden/Portainer
    resolver 127.0.0.11 valid=30s;  # DNS interno de Docker para resolver nombres de contenedores

    # =============================================================
    # BLOQUE 1: REDIRECCIÓN HTTP → HTTPS
    # @Para qué sirve: Cualquier petición que llegue por HTTP (puerto 80)
    #   se redirige automáticamente a HTTPS (puerto 443) con código 301
    #   (redirección permanente). Así garantizamos que toda la comunicación
    #   con los servicios de gestión esté cifrada.
    # =============================================================
    server {
        listen 80;
        server_name 10.0.10.20 *.canarias.local;
        return 301 https://$host$request_uri;
    }

    # =============================================================
    # BLOQUE 2: SERVIDOR DEFAULT — Portal PKI + Rutas por IP
    # @Para qué sirve: Este es el servidor "por defecto". Cuando alguien
    #   accede a https://10.0.10.20 sin un dominio específico, cae aquí.
    #   Página principal: Portal de descarga de certificados (PKI).
    #   Además, ofrece "rutas de emergencia" para acceder a cada servicio
    #   escribiendo la IP directamente (sin necesidad de DNS).
    # =============================================================
    server {
        listen 443 ssl default_server;
        server_name 10.0.10.20 pki.canarias.local;
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Página principal: Portal PKI (descarga de certificados)
        location / {
            root /usr/share/nginx/html;
            index pki.html;   # Archivo HTML servido desde gestion/pki.html
        }
        
        # Acceso directo a los archivos de certificados
        # @Para qué sirve: Permite navegar y descargar los .pem, .crt, etc.
        location /certs/ {
            alias /etc/nginx/certs/;
            autoindex on;    # Muestra listado de archivos como un explorador
        }

        # --- RUTAS DE EMERGENCIA (Acceso por IP sin DNS) ---
        # @Para qué sirve: Si el DNS falla o un administrador prefiere usar
        #   la IP directa, estas rutas permiten acceder a cada servicio
        #   añadiendo el nombre al final de la URL.
        #   Ejemplo: https://10.0.10.20/mail/ → Webmail (Rainloop)

        # Webmail (Rainloop): Puerto interno 8888
        location /mail/ {
            proxy_pass http://webmail_canarias:8888/;
            proxy_set_header Host $host;
        }

        # Vaultwarden (Gestor de contraseñas): Puerto interno 80
        location /vault/ {
            proxy_pass http://cofre_seguro:80/;
            proxy_set_header Host $host;
        }

        # Portainer (Orquestador Docker): Puerto interno 9443 (HTTPS)
        # @Importante: Portainer usa WebSockets, por eso necesita las
        #   cabeceras Upgrade y Connection para mantener conexiones abiertas.
        location /portainer/ {
            proxy_pass https://portainer_web:9443/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Uptime Kuma (Monitorización): Redirección al dominio
        # @Problema: Kuma es una SPA (Single Page Application) hecha con Vue.js
        #   que no soporta correr bajo un subpath como /status/.
        #   Su router interno espera estar en la raíz /.
        # @Solución: Redirigir al dominio status.canarias.local donde
        #   Kuma tiene su propio server block y funciona correctamente.
        # @Nota: El iframe tampoco funciona porque Kuma envía la cabecera
        #   X-Frame-Options: SAMEORIGIN que bloquea el embedding.
        location /status {
            return 302 https://status.canarias.local/;
        }
    }

    # =============================================================
    # BLOQUE 3: SERVIDORES POR NOMBRE (Virtual Hosts)
    # @Para qué sirve: Cuando un administrador accede usando el DOMINIO
    #   (ej. docker.canarias.local), Nginx identifica el nombre del host
    #   en la petición y la envía al contenedor correcto. Esto permite
    #   tener múltiples servicios en la misma IP (10.0.10.20) sin
    #   conflictos de puertos.
    # =============================================================

    # --- PORTAINER (Gestión de Docker) ---
    # @Acceso: https://docker.canarias.local
    # @Destino: Contenedor 'portainer_web' en el puerto 9443 (HTTPS)
    # @Nota: Necesita WebSockets para la terminal web y las actualizaciones
    #   en tiempo real del dashboard.
    server {
        listen 443 ssl;
        server_name docker.canarias.local;
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        location / {
            proxy_pass https://portainer_web:9443;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # --- VAULTWARDEN (Gestor de Contraseñas) ---
    # @Acceso: https://vault.canarias.local
    # @Destino: Contenedor 'cofre_seguro' en el puerto 80 (HTTP interno)
    # @Nota: Aunque el contenedor escucha en HTTP internamente, la conexión
    #   entre el navegador y Nginx está cifrada con HTTPS (TLS termination).
    server {
        listen 443 ssl;
        server_name vault.canarias.local;
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        location / {
            proxy_pass http://cofre_seguro:80;
            proxy_set_header Host $host;
        }
    }

    # --- UPTIME KUMA (Monitorización) ---
    # @Acceso: https://status.canarias.local
    # @Destino: Contenedor 'monitor_kuma' en el puerto 3001
    # @Nota: Necesita WebSockets para las actualizaciones en tiempo real
    #   del panel de estado (los indicadores se actualizan sin recargar).
    server {
        listen 443 ssl;
        server_name status.canarias.local;
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        location / {
            proxy_pass http://monitor_kuma:3001;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # --- WEBMAIL (Rainloop) ---
    # @Acceso: https://mail.canarias.local
    # @Destino: Contenedor 'webmail_canarias' en el puerto 8888
    # @Nota: La raíz (/) redirige a /mail/ para mantener consistencia
    #   con la ruta de emergencia por IP.
    server {
        listen 443 ssl;
        server_name mail.canarias.local;
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        location / { return 301 https://$host/mail/; }
        location /mail/ {
            proxy_pass http://webmail_canarias:8888/;
            proxy_set_header Host $host;
        }
    }
}

# @File: infraestructura/publico/nginx.conf
# @Description: Configuración del Proxy Inverso para la web pública (WordPress).
# @Logic: Balanceo de carga (HA) y seguridad perimetral.

events {
    worker_connections 1024; # Límite de conexiones simultáneas por trabajador.
}

http {
    include       mime.types; # Carga tipos de archivo estándar (CSS, JS, etc.)
    default_type  application/octet-stream;
    sendfile        on;
    client_max_body_size 512M; # Permite subir archivos grandes (imágenes/plugins) a WordPress.

    # --- OPTIMIZACIÓN GZIP: Mejora la velocidad de carga comprimiendo datos ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --- CABECERAS DE SEGURIDAD: Protegen contra ataques comunes ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; # Forzar HTTPS (HSTS)
    add_header X-Content-Type-Options nosniff; # Evita que el navegador adivine el tipo de archivo (MIME sniffing)
    add_header X-XSS-Protection "1; mode=block"; # Protección básica contra Cross-Site Scripting (XSS)

    resolver 127.0.0.11 valid=30s; # DNS interno de Docker para resolver nombres de contenedores.

    # --- BALANCEADOR WORDPRESS CON IP_HASH (Alta Disponibilidad) ---
    upstream wordpress_cluster {
        ip_hash; # @Importante: Garantiza la persistencia de sesión enviando al usuario siempre al mismo contenedor.
        server wordpress:8080; # Apunta al servicio 'wordpress' del docker-compose.
    }

    # REDIRECCIÓN GLOBAL: Forzar tráfico HTTP a HTTPS
    server {
        listen 80;
        server_name canarias.local 10.0.10.10;
        return 301 https://$host$request_uri;
    }

    # SERVIDOR WEB SEGURO (HTTPS)
    server {
        listen 443 ssl;
        server_name canarias.local 10.0.10.10;

        # @Certificados: Rutas internas mapeadas desde el host
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        add_header X-Frame-Options "SAMEORIGIN"; # Previene ataques de Clickjacking.

        # --- SECCIÓN WORDPRESS ---
        location / {
            proxy_pass http://wordpress_cluster; # Envía la petición al clúster balanceado.
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
